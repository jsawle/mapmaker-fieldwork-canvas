<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MapMaker Fieldwork — Upload (M3)</title>
</head>
<body>
  <h1>MapMaker Fieldwork — Upload your data</h1>
  <p>Drop a CSV with latitude and longitude columns to publish a map in MapMaker.</p>

  <p>
    <button id="sampleBtn">Try a sample</button>
  </p>

  <div id="dropZone" style="border: 2px dashed #888; padding: 40px; text-align: center; cursor: pointer;">
    <p><strong>Drop a CSV here</strong></p>
    <p>or</p>
    <p><button id="browseBtn">Browse files</button></p>
    <input type="file" id="fileInput" accept=".csv" style="display: none;">
  </div>

  <div id="status" style="margin-top: 20px;"></div>
  <div id="result" style="margin-top: 20px;"></div>

  <script>
    // -----------------------------------------------------------------------
    // Configuration
    // -----------------------------------------------------------------------
    const BRIDGE_URL = "https://68c61fd12475ebdd804374cf052e0d.0e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/dfe3048cccf84ed78ff9cd1e573d49f1/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=CKzxOsV_xJPL7sde92ypqb2dOIQ97FYyE8tsqRn0f9k";

    const NATGEO_BASEMAP = {
      title: "National Geographic Style",
      baseMapLayers: [
        { id: "World_Hillshade", title: "World Hillshade", url: "https://services.arcgisonline.com/arcgis/rest/services/Elevation/World_Hillshade/MapServer", layerType: "ArcGISTiledMapServiceLayer", itemId: "1b243539f4514b6ba35e7d995890db1d", visibility: true, opacity: 1 },
        { id: "NatGeoStyleBase", title: "National Geographic Style Base", url: "https://tiles.arcgis.com/tiles/P3ePLMYs2RVChkJx/arcgis/rest/services/NatGeoStyleBase/MapServer", layerType: "ArcGISTiledMapServiceLayer", itemId: "f9a070ff745b4d368b312eb647c53a4e", visibility: true, opacity: 1 },
        { id: "NatGeoNoLabel", title: "National Geographic Style (no label)", styleUrl: "https://www.arcgis.com/sharing/rest/content/items/be90e1f3c0164cd0adc7920e1679c65f/resources/styles/root.json", itemId: "be90e1f3c0164cd0adc7920e1679c65f", layerType: "VectorTileLayer" }
      ]
    };

    // ColorBrewer Set2 — colorblind-friendly categorical palette
    const PALETTE = [
      [102, 194, 165, 255], [252, 141,  98, 255], [141, 160, 203, 255],
      [231, 138, 195, 255], [166, 216,  84, 255], [255, 217,  47, 255],
      [229, 196, 148, 255], [179, 179, 179, 255]
    ];

    const NUMERIC_TYPES = new Set(["esriFieldTypeInteger", "esriFieldTypeDouble", "esriFieldTypeSmallInteger"]);
    const STRING_TYPES = new Set(["esriFieldTypeString"]);
    const COORD_NAMES = new Set(["latitude", "longitude", "lat", "lon", "lng", "x", "y"]);
    const OID_NAMES = new Set(["ObjectId", "OBJECTID", "FID"]);

    const ANALYZE_URL = "https://www.arcgis.com/sharing/rest/content/features/analyze";
    const GENERATE_URL = "https://www.arcgis.com/sharing/rest/content/features/generate";

    // -----------------------------------------------------------------------
    // Sample CSV (for the "Try a sample" button)
    // -----------------------------------------------------------------------
    const SAMPLE_CSV = `Species,DBH_cm,Longitude,Latitude
Coast Live Oak,45,-117.1656,32.7114
Eucalyptus,80,-117.1626,32.7093
Jacaranda,30,-117.1601,32.7104
Palm,25,-117.1592,32.7114
Coast Live Oak,55,-117.1628,32.7114
Eucalyptus,90,-117.1601,32.7083
Jacaranda,35,-117.1610,32.7125
Palm,20,-117.1610,32.7094
Coast Live Oak,60,-117.1583,32.7083
Eucalyptus,75,-117.1620,32.7104
Magnolia,40,-117.1638,32.7104
Palm,28,-117.1583,32.7104
Coast Live Oak,50,-117.1638,32.7125
Coral Tree,35,-117.1591,32.7125
Eucalyptus,85,-117.1610,32.7114`;

    // -----------------------------------------------------------------------
    // UI helpers
    // -----------------------------------------------------------------------
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const browseBtn = document.getElementById("browseBtn");
    const sampleBtn = document.getElementById("sampleBtn");

    function setStatus(text) {
      statusEl.innerHTML = text ? `<p>${text}</p>` : "";
    }

    function showResult(html) {
      resultEl.innerHTML = html;
    }

    function showError(message) {
      setStatus("");
      showResult(`<p style="color: crimson;"><strong>Error:</strong> ${message}</p>`);
      sampleBtn.disabled = false;
      browseBtn.disabled = false;
    }

    // -----------------------------------------------------------------------
    // AGOL: analyze + generate (anonymous)
    // -----------------------------------------------------------------------
    async function analyzeCSV(csvBlob) {
      const fd = new FormData();
      fd.append("f", "json");
      fd.append("fileType", "csv");
      fd.append("analyzeParameters", JSON.stringify({ enableGlobalGeocoding: false }));
      fd.append("file", csvBlob, "upload.csv");

      const r = await fetch(ANALYZE_URL, { method: "POST", body: fd });
      if (!r.ok) throw new Error(`Analyze HTTP ${r.status}`);
      const data = await r.json();
      if (data.error) throw new Error(`AGOL analyze: ${data.error.message || JSON.stringify(data.error)}`);
      return data.publishParameters;
    }

    async function generateFeatures(csvBlob, publishParameters) {
      const fd = new FormData();
      fd.append("f", "json");
      fd.append("fileType", "csv");
      fd.append("publishParameters", JSON.stringify(publishParameters));
      fd.append("file", csvBlob, "upload.csv");

      const r = await fetch(GENERATE_URL, { method: "POST", body: fd });
      if (!r.ok) throw new Error(`Generate HTTP ${r.status}`);
      const data = await r.json();
      if (data.error) throw new Error(`AGOL generate: ${data.error.message || JSON.stringify(data.error)}`);
      return data.featureCollection.layers[0];
    }

    // -----------------------------------------------------------------------
    // Renderer detection — picks one of four strategies
    // -----------------------------------------------------------------------
    function classifyColumns(fields, features) {
      const numeric = [];
      const categorical = [];
      for (const f of fields) {
        if (OID_NAMES.has(f.name)) continue;
        if (COORD_NAMES.has(f.name.toLowerCase())) continue;
        if (NUMERIC_TYPES.has(f.type)) {
          numeric.push(f.name);
        } else if (STRING_TYPES.has(f.type)) {
          const unique = new Set();
          for (const feat of features) {
            const v = feat.attributes[f.name];
            if (v !== null && v !== undefined && v !== "") unique.add(v);
          }
          if (unique.size >= 2 && unique.size <= 12) categorical.push(f.name);
        }
      }
      return { numeric, categorical };
    }

    function pickStrategy(numeric, categorical) {
      if (numeric.length >= 3) return "pie_chart";
      if (categorical.length >= 1 && numeric.length >= 1) return "unique_with_size";
      if (categorical.length >= 1) return "unique_values";
      if (numeric.length >= 1) return "proportional";
      return "simple";
    }

    // -----------------------------------------------------------------------
    // Renderer builders
    // -----------------------------------------------------------------------
    function buildPieChartRenderer(numericFields) {
      return {
        type: "pieChart",
        attributes: numericFields.slice(0, 8).map((fld, i) => ({
          field: fld,
          color: PALETTE[i % PALETTE.length],
          label: fld.replace(/_/g, " ")
        })),
        size: 24,
        holePercentage: 0.4,
        outline: { color: [255, 255, 255, 255], width: 0.5, type: "esriSLS", style: "esriSLSSolid" }
      };
    }

    function buildProportionalRenderer(field, features) {
      const values = features.map(f => f.attributes[field]).filter(v => v !== null && !isNaN(v));
      const min = Math.min(...values);
      const max = Math.max(...values);
      return {
        type: "simple",
        symbol: {
          type: "esriSMS", style: "esriSMSCircle",
          color: [102, 194, 165, 200],
          size: 12,
          outline: { color: [255, 255, 255, 255], width: 1 }
        },
        visualVariables: [{
          type: "sizeInfo",
          field: field,
          minSize: 8, maxSize: 40,
          minDataValue: min, maxDataValue: max
        }],
        label: field.replace(/_/g, " ")
      };
    }

    function buildUniqueValueRenderer(field, features) {
      const unique = new Set();
      for (const f of features) {
        const v = f.attributes[field];
        if (v !== null && v !== undefined && v !== "") unique.add(v);
      }
      const values = Array.from(unique).sort();
      return {
        type: "uniqueValue",
        field1: field,
        defaultSymbol: {
          type: "esriSMS", style: "esriSMSCircle",
          color: [179, 179, 179, 200], size: 12,
          outline: { color: [255, 255, 255, 255], width: 1 }
        },
        defaultLabel: "Other",
        uniqueValueInfos: values.map((val, i) => ({
          value: val,
          label: String(val),
          symbol: {
            type: "esriSMS", style: "esriSMSCircle",
            color: PALETTE[i % PALETTE.length],
            size: 12,
            outline: { color: [255, 255, 255, 255], width: 1 }
          }
        }))
      };
    }

    function buildUniqueWithSizeRenderer(catField, numField, features) {
      const renderer = buildUniqueValueRenderer(catField, features);
      const values = features.map(f => f.attributes[numField]).filter(v => v !== null && !isNaN(v));
      renderer.visualVariables = [{
        type: "sizeInfo",
        field: numField,
        minSize: 8, maxSize: 40,
        minDataValue: Math.min(...values),
        maxDataValue: Math.max(...values)
      }];
      return renderer;
    }

    // -----------------------------------------------------------------------
    // Build the operational layer
    // -----------------------------------------------------------------------
    function buildOperationalLayer(fcLayer, fields, features, strategy, numeric, categorical, baseTitle) {
      let renderer, popupTitle;
      switch (strategy) {
        case "pie_chart":
          renderer = buildPieChartRenderer(numeric);
          popupTitle = "Composition breakdown";
          break;
        case "proportional":
          renderer = buildProportionalRenderer(numeric[0], features);
          popupTitle = `{${numeric[0]}}`;
          break;
        case "unique_values":
          renderer = buildUniqueValueRenderer(categorical[0], features);
          popupTitle = `{${categorical[0]}}`;
          break;
        case "unique_with_size":
          renderer = buildUniqueWithSizeRenderer(categorical[0], numeric[0], features);
          popupTitle = `{${categorical[0]}} – {${numeric[0]}}`;
          break;
        default:
          renderer = {
            type: "simple",
            symbol: {
              type: "esriSMS", style: "esriSMSCircle",
              color: [102, 194, 165, 200], size: 10,
              outline: { color: [255, 255, 255, 255], width: 1 }
            }
          };
          popupTitle = "Point";
      }

      const popupFieldInfos = fields
        .filter(f => !OID_NAMES.has(f.name) && !COORD_NAMES.has(f.name.toLowerCase()))
        .map(f => ({ fieldName: f.name, label: f.name.replace(/_/g, " "), visible: true }));

      const popupInfo = { title: popupTitle, fieldInfos: popupFieldInfos };

      const layerDef = {
        ...fcLayer.layerDefinition,
        drawingInfo: { renderer },
        showLegend: true
      };

      return {
        id: `fieldwork_${Date.now()}`,
        title: baseTitle,
        layerType: "ArcGISFeatureLayer",
        visibility: true,
        opacity: 1,
        showLegend: true,
        popupInfo,
        featureCollection: {
          showLegend: true,
          layers: [{
            layerDefinition: layerDef,
            featureSet: fcLayer.featureSet,
            popupInfo,
            showLegend: true
          }]
        }
      };
    }

    // -----------------------------------------------------------------------
    // Compute extent from features
    // -----------------------------------------------------------------------
    function computeExtent(features) {
      const xs = features.map(f => f.geometry.x);
      const ys = features.map(f => f.geometry.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const padX = Math.max((maxX - minX) * 0.2, 100);
      const padY = Math.max((maxY - minY) * 0.2, 100);
      return {
        xmin: minX - padX, ymin: minY - padY,
        xmax: maxX + padX, ymax: maxY + padY,
        spatialReference: { wkid: 102100, latestWkid: 3857 }
      };
    }

    // -----------------------------------------------------------------------
    // Build the complete web map JSON
    // -----------------------------------------------------------------------
    function buildWebMapJson(operationalLayer, extent) {
      return {
        operationalLayers: [operationalLayer],
        baseMap: NATGEO_BASEMAP,
        spatialReference: { wkid: 102100, latestWkid: 3857 },
        initialState: { viewpoint: { targetGeometry: extent } },
        timeZone: "system",
        version: "2.33",
        authoringApp: "MapMakerFieldworkPOC-Canvas",
        authoringAppVersion: "0.3-m3"
      };
    }

    // -----------------------------------------------------------------------
    // Send to bridge
    // -----------------------------------------------------------------------
    async function publishViaBridge(title, snippet, tags, webMapJson) {
      const r = await fetch(BRIDGE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, snippet, tags, webMapJson })
      });
      if (!r.ok) throw new Error(`Bridge HTTP ${r.status}`);
      const data = await r.json();
      if (!data.mapMakerUrl) throw new Error("Bridge response missing mapMakerUrl");
      return data;
    }

    // -----------------------------------------------------------------------
    // Validate (Layer 2 — basic data-shape checks)
    // -----------------------------------------------------------------------
    function validateFeatures(features) {
      if (features.length < 2) {
        throw new Error("Your file needs at least 2 rows of data with coordinates.");
      }
      const withGeom = features.filter(f => f.geometry && typeof f.geometry.x === "number");
      if (withGeom.length < features.length * 0.5) {
        throw new Error("Most rows don't have valid coordinates. Make sure your CSV has columns named latitude/longitude (or lat/lon) with numeric values.");
      }
    }

    // -----------------------------------------------------------------------
    // Main pipeline — turn a CSV blob into a published map
    // -----------------------------------------------------------------------
    async function processCSV(csvBlob, displayName) {
      sampleBtn.disabled = true;
      browseBtn.disabled = true;
      showResult("");

      try {
        setStatus("Reading your file…");
        await new Promise(r => setTimeout(r, 100));

        setStatus("Asking ArcGIS to parse your data…");
        const publishParams = await analyzeCSV(csvBlob);

        setStatus("Building features from your data…");
        const fcLayer = await generateFeatures(csvBlob, publishParams);
        const features = fcLayer.featureSet.features;
        const fields = fcLayer.layerDefinition.fields;

        validateFeatures(features);

        const { numeric, categorical } = classifyColumns(fields, features);
        const strategy = pickStrategy(numeric, categorical);

        setStatus(`Building map (${strategy.replace(/_/g, " ")})…`);
        const baseTitle = displayName.replace(/\.csv$/i, "").replace(/_/g, " ");
        const opLayer = buildOperationalLayer(fcLayer, fields, features, strategy, numeric, categorical, baseTitle);
        const extent = computeExtent(features);
        const webMapJson = buildWebMapJson(opLayer, extent);

        setStatus("Publishing your map…");
        const result = await publishViaBridge(
          baseTitle,
          `Fieldwork data: ${features.length} points (${strategy})`,
          `mapmaker, fieldwork, ${strategy}`,
          webMapJson
        );

        setStatus("");
        showResult(`
          <p><strong>Your map is ready.</strong> ${features.length} points published.</p>
          <p><a href="${result.mapMakerUrl}" target="_blank" rel="noopener" style="font-size: 1.2em;">Open in MapMaker</a></p>
          <p><small>Item ID: ${result.itemId}</small></p>
        `);
      } catch (err) {
        showError(err.message);
        console.error(err);
      } finally {
        sampleBtn.disabled = false;
        browseBtn.disabled = false;
      }
    }

    // -----------------------------------------------------------------------
    // Wire up the UI
    // -----------------------------------------------------------------------
    browseBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) processCSV(file, file.name);
      fileInput.value = "";
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.borderColor = "#0078d4";
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.style.borderColor = "#888";
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.style.borderColor = "#888";
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (!file.name.toLowerCase().endsWith(".csv")) {
        showError("This tool only accepts CSV files. Please save your spreadsheet as CSV first.");
        return;
      }
      processCSV(file, file.name);
    });

    sampleBtn.addEventListener("click", () => {
      const blob = new Blob([SAMPLE_CSV], { type: "text/csv" });
      processCSV(blob, "Sample Tree Survey.csv");
    });
  </script>
</body>
</html>
